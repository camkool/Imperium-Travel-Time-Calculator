<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imperium Travel Time Calculator</title>

  <style>
    :root {
      --bg: #090909;
      --panel: #151515;
      --panel-light: #1f1f1f;
      --stone: #2b2b2b;
      --text: #e6e0d2;
      --muted: #9b9487;
      --bronze: #a67c3d;
      --gold: #c8a75a;
      --crimson: #7a1118;
      --red-glow: rgba(122, 17, 24, 0.45);
      --border: rgba(200, 167, 90, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(122, 17, 24, 0.25), transparent 35%),
        linear-gradient(135deg, #050505 0%, #151515 50%, #080808 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .terminal {
      width: 100%;
      max-width: 760px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), transparent 20%),
        var(--panel);
      border: 1px solid var(--border);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.85),
        0 0 22px var(--red-glow);
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .terminal::before,
    .terminal::after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      border: 1px solid rgba(200, 167, 90, 0.18);
      transform: rotate(45deg);
      pointer-events: none;
    }

    .terminal::before {
      top: -90px;
      left: -90px;
    }

    .terminal::after {
      bottom: -90px;
      right: -90px;
    }

    .header {
      text-align: center;
      border-bottom: 1px solid rgba(200, 167, 90, 0.35);
      padding-bottom: 18px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.2rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    .input-panel,
    .output-panel {
      background:
        linear-gradient(90deg, rgba(122,17,24,0.16), transparent),
        var(--panel-light);
      border: 1px solid rgba(200, 167, 90, 0.25);
      padding: 20px;
    }

    label {
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      font-size: 0.8rem;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 16px;
      background: #070707;
      border: 1px solid rgba(200, 167, 90, 0.45);
      color: var(--text);
      font-size: 1.4rem;
      outline: none;
      font-family: inherit;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 14px rgba(200, 167, 90, 0.25);
    }

    .formula {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .result-main {
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--gold);
      text-align: center;
      margin: 10px 0;
      letter-spacing: 0.04em;
      text-shadow: 0 0 16px rgba(200, 167, 90, 0.2);
    }

    .result-sub {
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 16px;
    }

    .breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      border: 1px solid rgba(200, 167, 90, 0.2);
      background: rgba(0, 0, 0, 0.25);
      padding: 14px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    @media (max-width: 600px) {
      .terminal {
        padding: 20px;
      }

      .breakdown {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="terminal">
    <section class="header">
      <h1>Travel Time Calculator</h1>
      <div class="subtitle">Enter map distance in metres to calculate Imperial transit duration.</div>
    </section>

    <section class="grid">
      <div class="input-panel">
        <label for="meters">Distance Across Map</label>
        <input
          id="meters"
          type="number"
          min="0"
          step="0.01"
          placeholder="Enter metres..."
          oninput="calculateTravelTime()"
        />
        <div class="formula">Imperial scale: 1 map metre = 0.25 seconds travel time.</div>
      </div>

      <div class="output-panel">
        <label>Estimated Travel Duration</label>
        <div class="result-main" id="mainResult">—</div>
        <div class="result-sub" id="subResult">Awaiting distance input</div>

        <div class="breakdown">
          <div class="stat">
            <div class="stat-value" id="hours">0</div>
            <div class="stat-label">Hours</div>
          </div>

          <div class="stat">
            <div class="stat-value" id="minutes">0</div>
            <div class="stat-label">Minutes</div>
          </div>

          <div class="stat">
            <div class="stat-value" id="seconds">0</div>
            <div class="stat-label">Seconds</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    function calculateTravelTime() {
      const metersInput = document.getElementById("meters");
      const meters = parseFloat(metersInput.value);

      const mainResult = document.getElementById("mainResult");
      const subResult = document.getElementById("subResult");
      const hoursBox = document.getElementById("hours");
      const minutesBox = document.getElementById("minutes");
      const secondsBox = document.getElementById("seconds");

      if (isNaN(meters) || meters < 0) {
        mainResult.textContent = "—";
        subResult.textContent = "Awaiting distance input";
        hoursBox.textContent = "0";
        minutesBox.textContent = "0";
        secondsBox.textContent = "0";
        return;
      }

      const totalSeconds = meters * 0.25;

      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = Math.round(totalSeconds % 60);

      let readable = "";

      if (hours > 0) readable += `${hours}h `;
      if (minutes > 0 || hours > 0) readable += `${minutes}m `;
      readable += `${seconds}s`;

      mainResult.textContent = readable.trim();
      subResult.textContent = `${meters.toLocaleString()} map metres × 0.25 seconds = ${totalSeconds.toLocaleString()} seconds`;

      hoursBox.textContent = hours.toLocaleString();
      minutesBox.textContent = minutes.toLocaleString();
      secondsBox.textContent = seconds.toLocaleString();
    }
  </script>
</body>
</html>
